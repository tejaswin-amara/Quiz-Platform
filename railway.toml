# ============================================================
# railway.toml  —  Railway.app deployment configuration
# https://docs.railway.app/reference/config-as-code
# ============================================================

[build]
# Use the multi-stage Dockerfile that builds the JAR inside Docker.
# DO NOT change to the standard Dockerfile — that one requires a
# pre-built JAR artifact from the CI pipeline.
builder       = "DOCKERFILE"
dockerfilePath = "Dockerfile.railway"

[deploy]
# START_COMMAND is intentionally left out; the Dockerfile ENTRYPOINT handles it.
# Override SPRING_PROFILES_ACTIVE via Railway environment variables if needed.
healthcheckPath    = "/actuator/health"
healthcheckTimeout = 90          # allow extra time for JVM + Flyway startup
restartPolicyType  = "ON_FAILURE"
restartPolicyMaxRetries = 3

# ── Required environment variables ──────────────────────────
# Set ALL of these in the Railway service's Variables tab.
# Do NOT commit real values here — use Railway's secret management.
#
# SPRING_PROFILES_ACTIVE   = prod
# SERVER_PORT              = 8080
#
# DB_URL                   = jdbc:mysql://<railway-mysql-host>:3306/quiz_platform
# DB_USERNAME              = <db-user>
# DB_PASSWORD              = <db-password>
#
# JWT_SECRET_BASE64        = <base64-encoded 32+ byte random key>
#                            Generate: openssl rand -base64 48
# JWT_EXPIRATION_SECONDS   = 3600
#
# APP_ALLOWED_ORIGINS      = https://<your-pages-url>.github.io
#
# See DEPLOYMENT.md §3 for the full setup walkthrough.
