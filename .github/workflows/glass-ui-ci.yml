name: glass-ui-ci

on:
  pull_request:
    paths:
      - "glass-ui/**"
      - ".github/workflows/glass-ui-ci.yml"
  push:
    branches: [main]
    paths:
      - "glass-ui/**"
      - ".github/workflows/glass-ui-ci.yml"

concurrency:
  group: glass-ui-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    defaults:
      run:
        working-directory: glass-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: glass-ui/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test -- --watchAll=false
      - run: npm run build
      - run: npm run build:lib
      - run: npm run build-storybook
