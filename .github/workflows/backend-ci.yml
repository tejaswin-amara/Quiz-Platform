name: backend-ci

on:
  pull_request:
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.github/workflows/backend-ci.yml'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.github/workflows/backend-ci.yml'

permissions:
  contents: read
  security-events: write

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build + tests + verification
        run: mvn -B -ntp verify
      - name: Package jar for Docker runtime validation
        run: mvn -B -ntp -DskipTests package
      - name: Validate Docker image build
        run: docker build -t quiz-platform-ci .
      - name: Validate docker compose configuration
        # Supply dummy values for :? required variables so docker compose can
        # parse and validate the YAML without actually starting any services.
        env:
          MYSQL_ROOT_PASSWORD: ci-validation-dummy
          MYSQL_USER: ci-validation-dummy
          MYSQL_PASSWORD: ci-validation-dummy
          DB_USERNAME: ci-validation-dummy
          DB_PASSWORD: ci-validation-dummy
          JWT_SECRET_BASE64: Y2ktdmFsaWRhdGlvbi1kdW1teS1zZWNyZXQ=
        run: docker compose config -q

  codeql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: java
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build for CodeQL
        run: mvn -B -ntp -DskipTests compile
      - uses: github/codeql-action/analyze@v3
