name: Bug report
description: Report a reproducible defect in glass-ui components or tooling.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. ...\n2. ...\n3. ..."
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: glass-ui version
      placeholder: "e.g. 1.0.0"
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: "Browser, OS, React version, Node version"
