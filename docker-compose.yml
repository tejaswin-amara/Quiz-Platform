services:
  db:
    image: mysql:8.0
    container_name: quiz-platform-db
    environment:
      MYSQL_DATABASE: quiz_platform
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: quiz
      MYSQL_PASSWORD: quiz
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  app:
    build: .
    container_name: quiz-platform-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_URL: ${DB_URL:-jdbc:mysql://db:3306/quiz_platform}
      DB_USERNAME: ${DB_USERNAME:-quiz}
      DB_PASSWORD: ${DB_PASSWORD:-quiz}
      JWT_SECRET_BASE64: ${JWT_SECRET_BASE64:-VGhpc0lzQURldmVsb3BtZW50U2FtcGxlSldUU2VjcmV0S2V5MTIzNDU2Nzg5MDE=}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-3600}
      SERVER_PORT: ${SERVER_PORT:-8080}
    ports:
      - "${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    restart: unless-stopped
