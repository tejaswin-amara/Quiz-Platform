spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/quiz_platform}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
server.port=${SERVER_PORT:8080}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Disable H2 console in production profile
spring.h2.console.enabled=false

security.jwt.secret=${JWT_SECRET_BASE64}
security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}

server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
management.endpoint.health.probes.enabled=true
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
