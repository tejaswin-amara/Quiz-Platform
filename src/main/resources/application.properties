spring.application.name=quiz-platform
server.port=${SERVER_PORT:8080}

# Default local profile uses H2 for zero-setup persistence.
spring.datasource.url=jdbc:h2:file:./data/quiz-platform
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Live session defaults
quiz.session.default-question-duration-seconds=15
quiz.session.expiry-minutes=45
quiz.session.cleanup-interval-ms=60000

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Security/JWT (use env override in production)
security.jwt.secret=${JWT_SECRET_BASE64:VGhpc0lzQURldmVsb3BtZW50U2FtcGxlSldUU2VjcmV0S2V5MTIzNDU2Nzg5MDE=}
security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}

# Operations
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
management.endpoint.health.probes.enabled=true
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never
observability.slow-request-threshold-ms=1000
logging.pattern.level=%5p [req:%X{requestId:-}]
