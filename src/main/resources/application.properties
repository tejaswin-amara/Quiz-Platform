spring.application.name=quiz-platform
server.port=${SERVER_PORT:8080}

# Default local profile uses H2 for zero-setup persistence.
spring.datasource.url=jdbc:h2:file:./data/quiz-platform
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Live session defaults
quiz.session.default-question-duration-seconds=15
quiz.session.expiry-minutes=45
quiz.session.cleanup-interval-ms=60000
